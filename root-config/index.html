<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mini Shop — single-spa root-config</title>

  <!--
    import-map: ánh xạ tên module -> URL thật.
    Đây là "trái tim" của single-spa runtime: root-config và MFE chỉ cần
    import 'single-spa' / '@mishop/navbar'..., browser tra bảng này ra URL.
    Đổi URL ở đây = đổi phiên bản MFE mà KHÔNG cần build lại root.
  -->
  <script type="importmap">
  {
    "imports": {
      "single-spa": "https://cdn.jsdelivr.net/npm/single-spa@6.0.1/lib/es2015/esm/single-spa.min.js",
      "react": "https://esm.sh/react@18.2.0",
      "react-dom": "https://esm.sh/react-dom@18.2.0?external=react",
      "react-dom/client": "https://esm.sh/react-dom@18.2.0/client?external=react",

      "@mishop/shared": "http://localhost:9004/store.js",
      "@mishop/navbar": "http://localhost:9001/navbar.js",
      "@mishop/products": "http://localhost:9002/products.js",
      "@mishop/cart": "http://localhost:9003/cart.js"
    }
  }
  </script>
</head>
<body>
  <!-- navbar MFE mount vào đây (luôn hiện), nội dung route vào #app-content -->
  <header id="navbar"></header>
  <main id="app-content"></main>

  <script type="module" src="./src/root-config.js"></script>
</body>
</html>
